<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascension | Routine</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Checkbox visual stability */
        .routine-checkbox {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #334155;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            background: transparent;
            flex-shrink: 0;
        }

        .routine-checkbox:checked {
            background: #3b82f6;
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59,130,246,0.6);
        }

        .routine-checkbox:checked::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: translate(-50%, -60%) rotate(45deg);
        }

        /* Reset button safety UI */
        .reset-btn {
            transition: all 0.2s ease;
        }

        .reset-btn:hover {
            color: #f87171;
        }

        .reset-btn:active {
            transform: scale(0.95);
        }

        /* Routine line-through safety */
        .done {
            text-decoration: line-through;
            opacity: 0.5;
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-200 font-sans antialiased selection:bg-blue-500 selection:text-white">

    <!-- Mobile Header -->
    <div class="lg:hidden flex justify-between items-center p-6 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="text-xl font-bold tracking-wider text-white">
            ASCENSION<span class="text-blue-500">.</span>
        </div>

        <button class="p-2 text-slate-400 hover:text-white transition" onclick="toggleSidebar()">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </div>

    <div class="flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed lg:static inset-y-0 left-0 z-40 w-64 bg-slate-900 border-r border-slate-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col justify-between p-6">

            <div>
                <div class="text-2xl font-bold tracking-widest text-white mb-10">
                    ASCENSION<span class="text-blue-500">.</span>
                </div>

                <nav class="space-y-2">
                    <a href="index.html"
                        class="flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                        <span>Overview</span>
                    </a>

                    <a href="progress.html"
                        class="flex items-center gap-3 p-3 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-900/20">
                        <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                        <span>Routine</span>
                    </a>
                </nav>
            </div>

            <!-- Progress Ring - Fixed Position -->
            <div class="hidden lg:block">
                <div class="text-center mb-2 text-xs text-slate-400 uppercase tracking-widest">Today</div>
                
                <!-- Progress Bar -->
                <div class="w-full h-2 bg-slate-800 rounded-full mb-4 overflow-hidden">
                    <div id="mobile-progress-bar" class="h-full bg-blue-500 transition-all duration-1000" style="width: 0%"></div>
                </div>

                <!-- Ring -->
                <div class="relative w-32 h-32 mx-auto flex items-center justify-center">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="8"
                            fill="transparent" class="text-slate-800" />

                        <circle id="ring-progress" cx="50" cy="50" r="40"
                            stroke="currentColor" stroke-width="8"
                            fill="transparent"
                            stroke-dasharray="251.2"
                            stroke-dashoffset="251.2"
                            class="text-blue-500 transition-all duration-1000" />
                    </svg>

                    <div class="absolute text-center">
                        <span id="ring-percent" class="text-2xl font-bold text-white">0%</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Overlay -->
        <div id="sidebar-overlay"
            class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden lg:hidden"
            onclick="toggleSidebar()"></div>

        <!-- Main -->
        <main class="flex-1 overflow-y-auto relative">

            <div class="absolute top-0 left-0 w-full h-96 bg-blue-600/10 blur-[120px] pointer-events-none"></div>

            <div class="p-6 lg:p-12 max-w-3xl mx-auto relative z-10">

                <!-- Mobile Progress Bar -->
                <div class="lg:hidden mb-6 p-4 rounded-xl bg-slate-900 border border-slate-800">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs text-slate-400">Today</span>
                        <span class="text-sm text-blue-400 font-bold" id="ring-percent-mobile">0%</span>
                    </div>
                    <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden">
                        <div id="mobile-progress-bar-mobile" class="h-full bg-blue-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <header class="mb-8 flex justify-between items-end">
                    <div>
                        <h1 class="text-3xl font-bold text-white mb-2">Daily Protocol</h1>
                        <p class="text-slate-400">Complete your stack to ascend.</p>

                        <p id="dynamic-date" class="text-xs text-slate-500 mt-1"></p>
                    </div>

                    <!-- LEVEL BADGE (Added) -->
                    <div class="flex items-center gap-2 px-3 py-2 bg-slate-900 rounded-full border border-blue-500/30">
                        <div class="text-right">
                            <div class="text-[9px] text-slate-500 uppercase">Rank</div>
                            <div class="text-xs font-bold text-blue-400" id="user-title">BEGINNER</div>
                        </div>
                        <div class="w-px h-6 bg-slate-700"></div>
                        <div class="text-right">
                            <div class="text-[9px] text-slate-500 uppercase">Lvl</div>
                            <div class="text-lg font-bold text-white" id="user-level">1</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[9px] text-slate-500 uppercase">XP</div>
                            <div class="text-xs text-slate-400" id="user-xp">0/100</div>
                        </div>
                    </div>
                </header>

                <!-- Reset Button -->
                <button
                    onclick="resetDay()"
                    class="reset-btn text-xs">
                    Reset Day
                </button>

                <!-- Routine -->
                <div class="space-y-4 mb-12" id="routine-container"></div>

                <!-- Water -->
                <div class="glass-card p-8 rounded-3xl border border-white/5 bg-white/5">

                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-white">Hydration Protocol</h3>
                        <span class="text-blue-400 text-sm">Goal: 9 glasses</span>
                    </div>

                    <div class="flex items-center justify-center gap-8 mb-6">

                        <button onclick="updateWater(-1)"
                            class="w-12 h-12 rounded-full bg-slate-800 text-white flex items-center justify-center hover:bg-slate-700 transition active:scale-95">
                            <i data-lucide="minus" class="w-6 h-6"></i>
                        </button>

                        <div class="text-center">
                            <div class="text-5xl font-bold text-white" id="water-count">0</div>
                            <div class="text-slate-500 text-sm">Glasses</div>
                        </div>

                        <button onclick="updateWater(1)"
                            class="w-12 h-12 rounded-full bg-blue-600 text-white flex items-center justify-center hover:bg-blue-500 transition active:scale-95">
                            <i data-lucide="plus" class="w-6 h-6"></i>
                        </button>

                    </div>
                </div>

            </div>

            <!-- RESET CONFIRM MODAL -->
            <div id="reset-modal"
                class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">

                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-[90%] max-w-sm shadow-xl">

                    <h2 class="text-white text-lg font-bold mb-2">Reset Day?</h2>

                    <p class="text-slate-400 text-sm mb-6">
                        This will clear today's progress. Your streak will only continue if today is completed.
                    </p>

                    <div class="flex justify-end gap-3">

                        <button id="cancel-reset"
                            class="px-4 py-2 text-sm text-slate-400 hover:text-white transition">
                            Cancel
                        </button>

                        <button id="confirm-reset"
                            class="px-4 py-2 text-sm bg-red-600 hover:bg-red-500 text-white rounded-lg transition">
                            Reset
                        </button>

                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>

</body>
</html>
